services:
  - type: web
    name: datacenter-shop
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python app.py
    healthCheckPath: /health
    envVars:
      - key: SMS_GATE_MODE
        value: cloud
      - key: SMS_GATE_URL
        value: https://api.sms-gate.app/3rdparty/v1/messages
      - key: SMS_GATE_USERNAME
        sync: false
      - key: SMS_GATE_PASSWORD
        sync: false
      - key: SMS_GATE_DEVICE_ID
        sync: false
      - key: SMS_GATE_SIM_NUMBER
        value: "1"
      - key: ADMIN_PASSWORD
        sync: false
